name: Stock Dashboard Auto Update

on:
  schedule:
    - cron: '30 8 * * 1-5'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 檢查倉庫代碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝套件
        run: |
          pip install pandas yfinance FinMind tabulate lxml

      - name: 執行選股掃描
        run: python daily_scan.py

      - name: 更新儀表板至首頁
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "內容無變動，跳過推送。"
          fi
