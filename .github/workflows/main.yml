name: Stock Dashboard Auto Update

on:
  schedule:
    # 這裡設定的是 UTC 時間 08:30，換算成台灣時間是 16:30 (收盤後資料最齊)
    - cron: '30 8 * * 1-5'
  workflow_dispatch: # 讓妳可以隨時手動按下 "Run workflow" 測試

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 檢查倉庫代碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝套件
        run: |
          pip install pandas requests beautifulsoup4 lxml tabulate FinMind yfinance
          # 備註：lxml 是解析 Goodinfo 表格的關鍵引擎

      - name: 執行選股掃描
        run: python daily_scan.py

      - name: 更新儀表板
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add README.md
          # 檢查是否有變動，有的話才 commit，沒有就跳過不報錯
          if ! git diff --cached --quiet; then
            git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "內容無變動，跳過推送。"
          fi
